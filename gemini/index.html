<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planos Orto-Gráficos Estrictos - Mesa de Arte</title>
    <style>
      :root {
        --bg: #e2e8f0;
        --paper: #ffffff;
        --ink: #000000;
        --dim: #dc2626;
        --hidden: #64748b;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        margin: 0;
        padding: 2rem;
      }
      .sheet {
        background: var(--paper);
        max-width: 1400px;
        margin: 0 auto 2rem auto;
        padding: 2rem;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        border: 1px solid #cbd5e1;
      }
      .title-block {
        border-bottom: 3px solid var(--ink);
        padding-bottom: 1rem;
        margin-bottom: 2rem;
      }
      .title-block h1 {
        margin: 0;
        font-size: 1.8rem;
        text-transform: uppercase;
      }
      .title-block p {
        margin: 5px 0 0 0;
        font-weight: bold;
        color: #475569;
      }

      svg {
        width: 100%;
        height: auto;
        border: 1px solid #f1f5f9;
        background-color: #fafafa;
      }
      .cut {
        stroke: var(--ink);
        stroke-width: 4;
        fill: #e2e8f0;
      }
      .view {
        stroke: var(--ink);
        stroke-width: 2.5;
        fill: none;
      }
      .hidden {
        stroke: var(--hidden);
        stroke-width: 2;
        stroke-dasharray: 10 10;
        fill: none;
      }
      .proj-line {
        stroke: #94a3b8;
        stroke-width: 1.5;
        stroke-dasharray: 20 10;
        fill: none;
      }

      .dim-line {
        stroke: var(--dim);
        stroke-width: 2;
        fill: none;
      }
      .dim-tick {
        stroke: var(--dim);
        stroke-width: 3;
      }
      .dim-text {
        fill: var(--dim);
        font-size: 28px;
        font-family: monospace;
        font-weight: bold;
        text-anchor: middle;
      }
      .label {
        fill: var(--ink);
        font-size: 32px;
        font-family: sans-serif;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="sheet">
      <div class="title-block">
        <h1>Lámina 1: Isla A (Módulo A0) - Proyección Ortogonal</h1>
        <p>
          Alineación estricta de vistas. Escala 1:1 en espacio de coordenadas
          SVG (Unidades en mm).
        </p>
      </div>

      <svg viewBox="-200 -200 2800 1200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker
            id="arrow"
            viewBox="0 0 10 10"
            refX="5"
            refY="5"
            markerWidth="6"
            markerHeight="6"
            orient="auto-start-reverse"
          >
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
          </marker>
        </defs>

        <line x1="0" y1="0" x2="2500" y2="0" class="proj-line" />
        <line x1="0" y1="582" x2="2500" y2="582" class="proj-line" />
        <line x1="0" y1="675" x2="2500" y2="675" class="proj-line" />
        <text x="648" y="-120" class="label" text-anchor="middle">
          VISTA FRONTAL
        </text>

        <line
          x1="0"
          y1="-50"
          x2="1296"
          y2="-50"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text x="648" y="-70" class="dim-text">ANCHO: 1296 mm</text>

        <line
          x1="-80"
          y1="0"
          x2="-80"
          y2="582"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text
          x="-100"
          y="291"
          class="dim-text"
          transform="rotate(-90, -100, 291)"
        >
          ALTO GABINETE: 582
        </text>

        <line
          x1="-80"
          y1="582"
          x2="-80"
          y2="675"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text
          x="-100"
          y="628"
          class="dim-text"
          transform="rotate(-90, -100, 628)"
        >
          BASE: 93
        </text>

        <rect
          x="0"
          y="0"
          width="1296"
          height="582"
          class="view"
          fill="#ffffff"
        />

        <rect x="0" y="0" width="1296" height="80" class="view" />
        <rect x="0" y="83" width="1296" height="80" class="view" />
        <rect x="0" y="166" width="1296" height="80" class="view" />
        <rect x="0" y="249" width="1296" height="80" class="view" />
        <rect x="0" y="332" width="1296" height="80" class="view" />
        <rect x="0" y="415" width="1296" height="80" class="view" />
        <rect x="0" y="498" width="1296" height="80" class="view" />
        <line
          x1="1330"
          y1="0"
          x2="1330"
          y2="80"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text x="1350" y="48" class="dim-text" text-anchor="start">
          FRENTE: 80
        </text>

        <rect x="0" y="582" width="1296" height="18" class="cut" />
        <rect x="150" y="600" width="60" height="75" class="view" />
        <rect x="1086" y="600" width="60" height="75" class="view" />

        <text x="2053" y="-120" class="label" text-anchor="middle">
          CORTE LATERAL (INTERIOR)
        </text>

        <line
          x1="1600"
          y1="-50"
          x2="2506"
          y2="-50"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text x="2053" y="-70" class="dim-text">PROFUNDIDAD: 906 mm</text>

        <rect x="1600" y="0" width="888" height="18" class="cut" />
        <rect x="1600" y="564" width="888" height="18" class="cut" />
        <rect x="2488" y="0" width="18" height="582" class="cut" />
        <rect
          x="1582"
          y="0"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="83"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="166"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="249"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="332"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="415"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="1582"
          y="498"
          width="18"
          height="80"
          class="cut"
          fill="#f8fafc"
        />

        <rect x="1605" y="130" width="860" height="6" class="view" />
        <rect x="1605" y="90" width="12" height="40" class="cut" />
        <rect x="2453" y="90" width="12" height="40" class="cut" />
        <line
          x1="1617"
          y1="110"
          x2="2453"
          y2="110"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text x="2035" y="100" class="dim-text">ESPACIO ÚTIL: 836 mm</text>

        <rect x="1600" y="582" width="906" height="18" class="cut" />
        <rect x="1750" y="600" width="60" height="75" class="view" />
        <rect x="2300" y="600" width="60" height="75" class="view" />

        <line
          x1="2580"
          y1="0"
          x2="2580"
          y2="675"
          class="dim-line"
          marker-start="url(#arrow)"
          marker-end="url(#arrow)"
        />
        <text
          x="2610"
          y="337"
          class="dim-text"
          transform="rotate(-90, 2610, 337)"
        >
          ALTURA ISLA: 675 mm
        </text>
      </svg>
    </div>

    <div class="sheet">
      <div class="title-block">
        <h1>Lámina 2: Isla B (Herramientas) - Proyección Ortogonal</h1>
        <p>
          Alineación estricta de vistas. Escala 1:1 en espacio de coordenadas
          SVG (Unidades en mm).
        </p>
      </div>

      <svg viewBox="-200 -200 2000 1200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker
            id="arrowB"
            viewBox="0 0 10 10"
            refX="5"
            refY="5"
            markerWidth="6"
            markerHeight="6"
            orient="auto-start-reverse"
          >
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
          </marker>
        </defs>

        <line x1="0" y1="0" x2="1800" y2="0" class="proj-line" />
        <line x1="0" y1="582" x2="1800" y2="582" class="proj-line" />
        <line x1="0" y1="675" x2="1800" y2="675" class="proj-line" />
        <text x="300" y="-120" class="label" text-anchor="middle">
          VISTA FRONTAL
        </text>

        <line
          x1="0"
          y1="-50"
          x2="600"
          y2="-50"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="300" y="-70" class="dim-text">ANCHO: 600 mm</text>

        <line
          x1="-80"
          y1="0"
          x2="-80"
          y2="582"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text
          x="-100"
          y="291"
          class="dim-text"
          transform="rotate(-90, -100, 291)"
        >
          ALTO GABINETE: 582
        </text>

        <rect
          x="0"
          y="0"
          width="600"
          height="582"
          class="view"
          fill="#ffffff"
        />

        <rect x="18" y="18" width="564" height="120" class="view" />
        <text x="300" y="85" class="label" text-anchor="middle">
          HUECO ABIERTO
        </text>

        <rect x="0" y="145" width="600" height="140" class="view" />
        <rect x="0" y="288" width="600" height="140" class="view" />
        <rect x="0" y="431" width="600" height="60" class="view" />
        <rect x="0" y="494" width="600" height="60" class="view" />
        <rect x="0" y="557" width="600" height="25" class="view" />

        <line
          x1="640"
          y1="145"
          x2="640"
          y2="285"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="660" y="225" class="dim-text" text-anchor="start">
          FRENTE: 140
        </text>

        <line
          x1="640"
          y1="431"
          x2="640"
          y2="491"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="660" y="468" class="dim-text" text-anchor="start">
          FRENTE: 60
        </text>

        <rect x="0" y="582" width="600" height="18" class="cut" />
        <rect x="80" y="600" width="60" height="75" class="view" />
        <rect x="460" y="600" width="60" height="75" class="view" />

        <text x="1353" y="-120" class="label" text-anchor="middle">
          CORTE LATERAL (INTERIOR)
        </text>

        <line
          x1="900"
          y1="-50"
          x2="1806"
          y2="-50"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="1353" y="-70" class="dim-text">PROFUNDIDAD: 906 mm</text>

        <rect x="900" y="0" width="906" height="18" class="cut" />
        <rect x="900" y="564" width="906" height="18" class="cut" />
        <rect x="1480" y="18" width="18" height="546" class="cut" />

        <rect
          x="882"
          y="145"
          width="18"
          height="140"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="882"
          y="288"
          width="18"
          height="140"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="882"
          y="431"
          width="18"
          height="60"
          class="cut"
          fill="#f8fafc"
        />
        <rect
          x="882"
          y="494"
          width="18"
          height="60"
          class="cut"
          fill="#f8fafc"
        />

        <rect x="905" y="155" width="550" height="120" class="view" />
        <rect x="905" y="298" width="550" height="120" class="view" />

        <line
          x1="905"
          y1="125"
          x2="1455"
          y2="125"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="1180" y="115" class="dim-text">CAJÓN: 550 mm</text>

        <rect x="1498" y="200" width="308" height="18" class="cut" />
        <rect x="1498" y="380" width="308" height="18" class="cut" />

        <line
          x1="1498"
          y1="235"
          x2="1806"
          y2="235"
          class="dim-line"
          marker-start="url(#arrowB)"
          marker-end="url(#arrowB)"
        />
        <text x="1652" y="225" class="dim-text">ESTANTE: 308 mm</text>

        <rect x="900" y="582" width="906" height="18" class="cut" />
        <rect x="1000" y="600" width="60" height="75" class="view" />
        <rect x="1600" y="600" width="60" height="75" class="view" />
      </svg>
    </div>
  </body>
</html>
