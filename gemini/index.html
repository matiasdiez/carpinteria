    <style>
      /* Variables FlyonUI */
      :root {
        --bg-body: #f8fafc;
        --bg-surface: #ffffff;
        --border: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --primary: #2563eb;
        --primary-bg: #eff6ff;
        --radius-box: 1rem;
        --radius-btn: 0.5rem;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }

      /* Reseteo y Tipografía */
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
        margin: 0;
        padding: 0;
      }

      /* Barra de Navegación */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .navbar-brand {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .navbar-menu {
        display: flex;
        gap: 0.5rem;
      }
      .nav-item {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-btn);
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: #f1f5f9;
        color: var(--text-main);
      }
      .nav-item.active {
        background: var(--primary-bg);
        color: var(--primary);
        font-weight: 600;
      }

      /* Contenedores y Tarjetas */
      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-box);
        box-shadow: var(--shadow-sm);
        padding: 2rem;
        margin-bottom: 2rem;
      }
      .card-header {
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }
      .card-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem 0;
      }

      /* Estilos de Dibujo SVG */
      svg {
        width: 100%;
        height: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        background-color: #fafafa;
        margin-bottom: 2rem;
        overflow: visible;
      }
      .cut {
        stroke: var(--text-main);
        stroke-width: 4;
        fill: #e2e8f0;
      }
      .view {
        stroke: var(--text-main);
        stroke-width: 2.5;
        fill: #ffffff;
      }
      .hidden {
        stroke: var(--text-muted);
        stroke-width: 2.5;
        stroke-dasharray: 12 12;
        fill: none;
      }
      .proj-line {
        stroke: #94a3b8;
        stroke-width: 1.5;
        stroke-dasharray: 15 10;
        fill: none;
      }

      /* Estilos de Cotas y Textos */
      .dim-line {
        stroke: #dc2626;
        stroke-width: 2.5;
        fill: none;
      }
      .dim-tick {
        stroke: #dc2626;
        stroke-width: 3.5;
      }
      .dim-text {
        fill: #dc2626;
        font-size: 32px;
        font-family: monospace;
        font-weight: bold;
        text-anchor: middle;
      }
      .dim-internal {
        fill: #059669;
        font-size: 28px;
        font-family: monospace;
        font-weight: bold;
        text-anchor: middle;
      }
      .line-internal {
        stroke: #059669;
        stroke-width: 2;
        fill: none;
      }
      .label-svg {
        fill: var(--text-main);
        font-size: 38px;
        font-family: sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>
