<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planos CNC - Optimizador de Cortes Completo</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --primary: #2563eb;
        --text: #0f172a;
        --border: #cbd5e1;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: var(--surface);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      h1,
      h2,
      h3 {
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
        margin-top: 2rem;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }
      button:hover {
        background: #1d4ed8;
      }
      .material-section {
        margin-bottom: 40px;
      }
      .board-container {
        margin-bottom: 30px;
        border: 1px solid var(--border);
        background: #f1f5f9;
        padding: 10px;
      }
      .board-title {
        font-weight: bold;
        margin-bottom: 10px;
        color: #334155;
      }
      svg {
        background: #e2e8f0;
        width: 100%;
        height: auto;
        border: 2px solid #64748b;
      }
      .part {
        fill: #bae6fd;
        stroke: #0369a1;
        stroke-width: 2;
      }
      .part-text {
        fill: #0c4a6e;
        font-size: 20px;
        font-family: monospace;
        text-anchor: middle;
        dominant-baseline: middle;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Planos CNC y Optimizador de Cortes</h1>
      <p>
        Cálculo de aprovechamiento de placas (2750 x 1830 mm) para todos los
        materiales. Espesor de sierra (Kerf): 3mm.
      </p>

      <div class="controls">
        <button onclick="runPacking()">🔄 Calcular Cortes</button>
        <button onclick="downloadDXF()">
          📥 Descargar DXF (Todas las placas)
        </button>
      </div>

      <div id="output"></div>
    </div>

    <script>
      const BOARD_W = 2750;
      const BOARD_H = 1830;
      const KERF = 3;

      // Base de datos completa separada por espesores
      const materialsData = {
        "MDF 25mm (Tablero)": [
          { id: "TAB-PRINCIPAL", w: 2596, h: 906, qty: 1 },
          { id: "TAB-REFUERZO", w: 2596, h: 300, qty: 3 }, // Las 3 tiras sobrantes para dar espesor de 50mm
        ],
        "MDF 18mm (Estructuras y Frentes)": [
          { id: "A-TAPA/BASE", w: 1296, h: 906, qty: 2 },
          { id: "A-LATERAL", w: 888, h: 546, qty: 2 },
          { id: "A-TRASERA", w: 1260, h: 546, qty: 1 },
          { id: "A-FRENTE-CAJON", w: 1296, h: 80, qty: 7 },
          { id: "B-TAPA/BASE", w: 600, h: 906, qty: 2 },
          { id: "B-LATERAL", w: 888, h: 546, qty: 2 },
          { id: "B-DIVISOR", w: 888, h: 546, qty: 1 },
          { id: "B-ESTANTE", w: 290, h: 564, qty: 2 },
          { id: "B-FRENTE-GRANDE", w: 596, h: 140, qty: 2 },
          { id: "B-FRENTE-CHICO", w: 596, h: 60, qty: 3 },
        ],
        "MDF 12mm (Cajas de Cajones)": [
          // Marcos Isla A (Para ocultar correderas y dar rigidez, altura 50mm aprox)
          { id: "CAJ-A-LATERAL", w: 860, h: 50, qty: 14 },
          { id: "CAJ-A-FRENTE/ATRAS", w: 1210, h: 50, qty: 14 },
          // Cajones Isla B (Laterales y contrafrentes)
          { id: "CAJ-B-LAT-GRANDE", w: 500, h: 120, qty: 4 },
          { id: "CAJ-B-CONTRA-GRANDE", w: 520, h: 120, qty: 4 },
          { id: "CAJ-B-LAT-CHICO", w: 500, h: 45, qty: 6 },
          { id: "CAJ-B-CONTRA-CHICO", w: 520, h: 45, qty: 6 },
        ],
        "MDF 5.5mm (Fondos)": [
          { id: "FONDO-A0", w: 1210, h: 860, qty: 7 },
          { id: "FONDO-B", w: 530, h: 500, qty: 5 },
        ],
      };

      let packedResults = {}; // Almacenará los bins por material

      class MaxRectsBin {
        constructor(w, h) {
          this.w = w;
          this.h = h;
          this.freeRects = [{ x: 0, y: 0, w: w, h: h }];
          this.usedRects = [];
        }
        insert(w, h, data) {
          let bestNode = null,
            bestShortFit = Infinity,
            bestLongFit = Infinity;
          for (let i = 0; i < this.freeRects.length; i++) {
            let fr = this.freeRects[i];
            if (fr.w >= w && fr.h >= h) {
              let shortFit = Math.min(fr.w - w, fr.h - h);
              let longFit = Math.max(fr.w - w, fr.h - h);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = {
                  x: fr.x,
                  y: fr.y,
                  w: w,
                  h: h,
                  data: data,
                  rot: false,
                };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }
            if (fr.w >= h && fr.h >= w) {
              let shortFit = Math.min(fr.w - h, fr.h - w);
              let longFit = Math.max(fr.w - h, fr.h - w);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = {
                  x: fr.x,
                  y: fr.y,
                  w: h,
                  h: w,
                  data: data,
                  rot: true,
                };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }
          }
          if (!bestNode) return null;
          this.usedRects.push(bestNode);

          let i = 0;
          while (i < this.freeRects.length) {
            if (this.splitNode(this.freeRects[i], bestNode))
              this.freeRects.splice(i, 1);
            else i++;
          }
          this.prune();
          return bestNode;
        }
        splitNode(free, used) {
          if (
            used.x >= free.x + free.w ||
            used.x + used.w <= free.x ||
            used.y >= free.y + free.h ||
            used.y + used.h <= free.y
          )
            return false;
          if (used.y > free.y && used.y < free.y + free.h)
            this.freeRects.push({ ...free, h: used.y - free.y });
          if (used.y + used.h < free.y + free.h)
            this.freeRects.push({
              ...free,
              y: used.y + used.h,
              h: free.y + free.h - (used.y + used.h),
            });
          if (used.x > free.x && used.x < free.x + free.w)
            this.freeRects.push({ ...free, w: used.x - free.x });
          if (used.x + used.w < free.x + free.w)
            this.freeRects.push({
              ...free,
              x: used.x + used.w,
              w: free.x + free.w - (used.x + used.w),
            });
          return true;
        }
        prune() {
          for (let i = 0; i < this.freeRects.length; i++) {
            for (let j = i + 1; j < this.freeRects.length; j++) {
              let rI = this.freeRects[i],
                rJ = this.freeRects[j];
              if (
                rI.x >= rJ.x &&
                rI.y >= rJ.y &&
                rI.x + rI.w <= rJ.x + rJ.w &&
                rI.y + rI.h <= rJ.y + rJ.h
              ) {
                this.freeRects.splice(i, 1);
                i--;
                break;
              }
              if (
                rJ.x >= rI.x &&
                rJ.y >= rI.y &&
                rJ.x + rJ.w <= rI.x + rI.w &&
                rJ.y + rJ.h <= rI.y + rI.h
              ) {
                this.freeRects.splice(j, 1);
                j--;
              }
            }
          }
        }
      }

      function runPacking() {
        packedResults = {};

        // Iterar sobre cada categoría de material
        for (const [materialName, parts] of Object.entries(materialsData)) {
          let partsToPack = [];
          parts.forEach((p) => {
            for (let i = 0; i < p.qty; i++)
              partsToPack.push({ id: `${p.id}`, w: p.w + KERF, h: p.h + KERF });
          });

          partsToPack.sort((a, b) => b.w * b.h - a.w * a.h);

          let bins = [];
          partsToPack.forEach((part) => {
            let placed = false;
            for (let i = 0; i < bins.length; i++) {
              if (bins[i].insert(part.w, part.h, part.id)) {
                placed = true;
                break;
              }
            }
            if (!placed) {
              let newBin = new MaxRectsBin(BOARD_W, BOARD_H);
              newBin.insert(part.w, part.h, part.id);
              bins.push(newBin);
            }
          });
          packedResults[materialName] = bins;
        }
        renderHTML();
      }

      function renderHTML() {
        const out = document.getElementById("output");
        out.innerHTML = "";

        for (const [materialName, bins] of Object.entries(packedResults)) {
          let matHtml = `<div class="material-section"><h2>${materialName} (Total placas: ${bins.length})</h2>`;

          bins.forEach((bin, index) => {
            let svg = `<svg viewBox="0 0 ${BOARD_W} ${BOARD_H}" xmlns="http://www.w3.org/2000/svg">`;
            bin.usedRects.forEach((rect) => {
              let w = rect.w - KERF,
                h = rect.h - KERF;
              svg += `<rect x="${rect.x}" y="${rect.y}" width="${w}" height="${h}" class="part" />
                            <text x="${rect.x + w / 2}" y="${rect.y + h / 2}" class="part-text">${rect.data}</text>
                            <text x="${rect.x + w / 2}" y="${rect.y + h / 2 + 25}" class="part-text" style="font-size:14px;">${w}x${h}</text>`;
            });
            svg += `</svg>`;
            matHtml += `<div class="board-container"><div class="board-title">Placa ${index + 1}</div>${svg}</div>`;
          });
          matHtml += `</div>`;
          out.innerHTML += matHtml;
        }
      }

      function downloadDXF() {
        let dxf = "0\nSECTION\n2\nENTITIES\n";
        const X_OFFSET = BOARD_W + 500;
        const Y_OFFSET_MAT = BOARD_H + 1000;

        let matIndex = 0;
        for (const [materialName, bins] of Object.entries(packedResults)) {
          let baseMatY = matIndex * Y_OFFSET_MAT;

          bins.forEach((bin, binIndex) => {
            let bx = binIndex * X_OFFSET;
            // Contorno de placa (Capa según material)
            dxf += createDXFRect(
              bx,
              baseMatY,
              BOARD_W,
              BOARD_H,
              `PLACA_${materialName.replace(/[^a-zA-Z0-9]/g, "_")}`,
            );

            bin.usedRects.forEach((rect) => {
              dxf += createDXFRect(
                bx + rect.x,
                baseMatY + rect.y,
                rect.w - KERF,
                rect.h - KERF,
                "CORTES",
              );
            });
          });
          matIndex++;
        }
        dxf += "0\nENDSEC\n0\nEOF\n";
        triggerDownload(
          "data:text/plain;charset=utf-8," + encodeURIComponent(dxf),
          "planos-cnc-completos.dxf",
        );
      }

      function createDXFRect(x, y, w, h, layer) {
        let lines = "";
        const pts = [
          [x, y],
          [x + w, y],
          [x + w, y + h],
          [x, y + h],
        ];
        for (let i = 0; i < 4; i++) {
          let p1 = pts[i],
            p2 = pts[(i + 1) % 4];
          lines += `0\nLINE\n8\n${layer}\n10\n${p1[0]}\n20\n${p1[1]}\n30\n0.0\n11\n${p2[0]}\n21\n${p2[1]}\n31\n0.0\n`;
        }
        return lines;
      }

      function triggerDownload(uri, filename) {
        let a = document.createElement("a");
        a.href = uri;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      window.onload = runPacking;
    </script>
  </body>
</html>
