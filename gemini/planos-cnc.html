<!doctype html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNC Nesting - Mesa de Arte</title>

      .navbar {

        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .navbar-brand {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .navbar-menu {
        display: flex;
        gap: 0.5rem;
      }
      .nav-item {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-btn);
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: #f1f5f9;
        color: var(--text-main);
      }
      .nav-item.active {
        background: #eff6ff;
        color: var(--primary);
        font-weight: 600;
      }

      .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-box);
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--shadow-sm);
      }
      .btn {
        display: inline-flex;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-btn);
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-main);
        margin-left: 0.5rem;
      }

      .material-section {
        margin-bottom: 3rem;
      }
      .material-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--text-main);
        border-bottom: 2px solid var(--border);
        padding-bottom: 0.5rem;
      }

      .board-container {
        margin-bottom: 1.5rem;
      }
      .board-label {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
      }
      svg {
        border: 2px solid var(--border);
        border-radius: 0.25rem;
        background: #f8fafc;
        width: 100%;
        height: auto;
      }
      .part {
        fill: #dbeafe;
        stroke: #3b82f6;
        stroke-width: 2;
      }
      .part-text {
        fill: #1e3a8a;
        font-size: 24px;
        font-family: monospace;
        text-anchor: middle;
        font-weight: bold;
      }
      .part-sub {
        fill: #1e3a8a;
        font-size: 16px;
        font-family: sans-serif;
        text-anchor: middle;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="navbar-brand">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="border: none; background: transparent; margin: 0"
        >
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
        EstudioArte
      </a>
      <div class="navbar-menu">
        <a href="index.html" class="nav-item">1. Planos</a>
        <a href="presupuesto-mesa.html" class="nav-item">2. Presupuesto</a>
        <a href="planos-cnc.html" class="nav-item active">3. CNC</a>
        <a href="detalles-constructivos.html" class="nav-item">4. Detalles</a>
        <a href="plan-armado.html" class="nav-item">5. Armado</a>
      </div>
    </nav>

    <div class="container">
      <div class="card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
          "
        >
          <div>
            <h2 style="margin: 0; font-size: 1.25rem">
              Nesting CNC MaxRects (Multi-material)
            </h2>
            <p style="margin: 0; color: var(--text-muted); font-size: 0.875rem">
              Cálculo de aprovechamiento (Kerf 3mm, Placas 2750x1830mm)
            </p>
          </div>
          <div>
            <button class="btn btn-primary" onclick="runPacking()">
              🔄 Recalcular Cortes
            </button>
            <button class="btn btn-outline" onclick="downloadDXF()">
              📥 Descargar DXF Total
            </button>
          </div>
        </div>
        <div id="output"></div>
      </div>
    </div>

    <script>
      const BOARD_W = 2750;
      const BOARD_H = 1830;
      const KERF = 3;

      const materialsData = {
        "MDF 25mm (Tablero)": [
          { id: "TAB-PRINCIPAL", w: 2596, h: 906, qty: 1 },
          { id: "TAB-REFUERZO", w: 2596, h: 300, qty: 3 },
        ],
        "MDF 18mm (Estructuras y Frentes)": [
          { id: "A-TAPA/BASE", w: 1296, h: 906, qty: 2 },
          { id: "A-LATERAL", w: 888, h: 546, qty: 2 },
          { id: "A-TRASERA", w: 1260, h: 546, qty: 1 },
          { id: "A-FRENTE", w: 1296, h: 80, qty: 7 },
          { id: "B-TAPA/BASE", w: 600, h: 906, qty: 2 },
          { id: "B-LATERAL", w: 888, h: 546, qty: 2 },
          { id: "B-DIVISOR", w: 888, h: 546, qty: 1 },
          { id: "B-ESTANTE", w: 290, h: 564, qty: 2 },
          { id: "B-FRENTE-GDE", w: 596, h: 140, qty: 2 },
          { id: "B-FRENTE-CH", w: 596, h: 60, qty: 3 },
        ],
        "MDF 12mm (Cajas de Cajones)": [
          { id: "CAJ-A-LAT", w: 860, h: 50, qty: 14 },
          { id: "CAJ-A-FRENTE", w: 1210, h: 50, qty: 14 },
          { id: "CAJ-B-LAT-GDE", w: 500, h: 120, qty: 4 },
          { id: "CAJ-B-CONT-GDE", w: 520, h: 120, qty: 4 },
          { id: "CAJ-B-LAT-CH", w: 500, h: 45, qty: 6 },
          { id: "CAJ-B-CONT-CH", w: 520, h: 45, qty: 6 },
        ],
        "MDF 5.5mm (Fondos)": [
          { id: "FONDO-A0", w: 1210, h: 860, qty: 7 },
          { id: "FONDO-B", w: 530, h: 500, qty: 5 },
        ],
      };

      let packedResults = {};

      class MaxRectsBin {
        constructor(w, h) {
          this.w = w;
          this.h = h;
          this.freeRects = [{ x: 0, y: 0, w: w, h: h }];
          this.usedRects = [];
        }
        insert(w, h, data) {
          let bestNode = null,
            bestShortFit = Infinity,
            bestLongFit = Infinity;
          for (let i = 0; i < this.freeRects.length; i++) {
            let fr = this.freeRects[i];
            if (fr.w >= w && fr.h >= h) {
              let shortFit = Math.min(fr.w - w, fr.h - h);
              let longFit = Math.max(fr.w - w, fr.h - h);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = {
                  x: fr.x,
                  y: fr.y,
                  w: w,
                  h: h,
                  data: data,
                  rot: false,
                };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }
            if (fr.w >= h && fr.h >= w) {
              let shortFit = Math.min(fr.w - h, fr.h - w);
              let longFit = Math.max(fr.w - h, fr.h - w);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = {
                  x: fr.x,
                  y: fr.y,
                  w: h,
                  h: w,
                  data: data,
                  rot: true,
                };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }
          }
          if (!bestNode) return null;
          this.usedRects.push(bestNode);
          let i = 0;
          while (i < this.freeRects.length) {
            if (this.splitNode(this.freeRects[i], bestNode))
              this.freeRects.splice(i, 1);
            else i++;
          }
          this.prune();
          return bestNode;
        }
        splitNode(free, used) {
          if (
            used.x >= free.x + free.w ||
            used.x + used.w <= free.x ||
            used.y >= free.y + free.h ||
            used.y + used.h <= free.y
          )
            return false;
          if (used.y > free.y && used.y < free.y + free.h)
            this.freeRects.push({ ...free, h: used.y - free.y });
          if (used.y + used.h < free.y + free.h)
            this.freeRects.push({
              ...free,
              y: used.y + used.h,
              h: free.y + free.h - (used.y + used.h),
            });
          if (used.x > free.x && used.x < free.x + free.w)
            this.freeRects.push({ ...free, w: used.x - free.x });
          if (used.x + used.w < free.x + free.w)
            this.freeRects.push({
              ...free,
              x: used.x + used.w,
              w: free.x + free.w - (used.x + used.w),
            });
          return true;
        }
        prune() {
          for (let i = 0; i < this.freeRects.length; i++) {
            for (let j = i + 1; j < this.freeRects.length; j++) {
              let rI = this.freeRects[i],
                rJ = this.freeRects[j];
              if (
                rI.x >= rJ.x &&
                rI.y >= rJ.y &&
                rI.x + rI.w <= rJ.x + rJ.w &&
                rI.y + rI.h <= rJ.y + rJ.h
              ) {
                this.freeRects.splice(i, 1);
                i--;
                break;
              }
              if (
                rJ.x >= rI.x &&
                rJ.y >= rI.y &&
                rJ.x + rJ.w <= rI.x + rI.w &&
                rJ.y + rJ.h <= rI.y + rI.h
              ) {
                this.freeRects.splice(j, 1);
                j--;
              }
            }
          }
        }
      }

      function runPacking() {
        packedResults = {};
        for (const [materialName, parts] of Object.entries(materialsData)) {
          let partsToPack = [];
          parts.forEach((p) => {
            for (let i = 0; i < p.qty; i++)
              partsToPack.push({ id: p.id, w: p.w + KERF, h: p.h + KERF });
          });
          partsToPack.sort((a, b) => b.w * b.h - a.w * a.h);
          let bins = [];
          partsToPack.forEach((part) => {
            let placed = false;
            for (let i = 0; i < bins.length; i++) {
              if (bins[i].insert(part.w, part.h, part.id)) {
                placed = true;
                break;
              }
            }
            if (!placed) {
              let newBin = new MaxRectsBin(BOARD_W, BOARD_H);
              newBin.insert(part.w, part.h, part.id);
              bins.push(newBin);
            }
          });
          packedResults[materialName] = bins;
        }
        renderHTML();
      }

      function renderHTML() {
        const out = document.getElementById("output");
        out.innerHTML = "";
        for (const [materialName, bins] of Object.entries(packedResults)) {
          let matHtml = `<div class="material-section"><div class="material-title">${materialName} (Total placas: ${bins.length})</div>`;
          bins.forEach((bin, index) => {
            let svg = `<svg viewBox="0 0 ${BOARD_W} ${BOARD_H}" xmlns="http://www.w3.org/2000/svg">`;
            bin.usedRects.forEach((rect) => {
              let w = rect.w - KERF,
                h = rect.h - KERF;
              svg += `<rect x="${rect.x}" y="${rect.y}" width="${w}" height="${h}" class="part" />
                            <text x="${rect.x + w / 2}" y="${rect.y + h / 2}" class="part-text">${rect.data}</text>
                            <text x="${rect.x + w / 2}" y="${rect.y + h / 2 + 30}" class="part-sub">${w}x${h}</text>`;
            });
            svg += `</svg>`;
            matHtml += `<div class="board-container"><div class="board-label">Placa ${index + 1}</div>${svg}</div>`;
          });
          matHtml += `</div>`;
          out.innerHTML += matHtml;
        }
      }

      function downloadDXF() {
        let dxf = "0\nSECTION\n2\nENTITIES\n";
        const X_OFFSET = BOARD_W + 500;
        const Y_OFFSET_MAT = BOARD_H + 1000;
        let matIndex = 0;
        for (const [materialName, bins] of Object.entries(packedResults)) {
          let baseMatY = matIndex * Y_OFFSET_MAT;
          bins.forEach((bin, binIndex) => {
            let bx = binIndex * X_OFFSET;
            dxf += createDXFRect(
              bx,
              baseMatY,
              BOARD_W,
              BOARD_H,
              `PLACA_${materialName.replace(/[^a-zA-Z0-9]/g, "_")}`,
            );
            bin.usedRects.forEach((rect) => {
              dxf += createDXFRect(
                bx + rect.x,
                baseMatY + rect.y,
                rect.w - KERF,
                rect.h - KERF,
                "CORTES",
              );
            });
          });
          matIndex++;
        }
        dxf += "0\nENDSEC\n0\nEOF\n";
        let a = document.createElement("a");
        a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(dxf);
        a.download = "planos-cnc-completos.dxf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      function createDXFRect(x, y, w, h, layer) {
        let lines = "";
        const pts = [
          [x, y],
          [x + w, y],
          [x + w, y + h],
          [x, y + h],
        ];
        for (let i = 0; i < 4; i++) {
          let p1 = pts[i],
            p2 = pts[(i + 1) % 4];
          lines += `0\nLINE\n8\n${layer}\n10\n${p1[0]}\n20\n${p1[1]}\n30\n0.0\n11\n${p2[0]}\n21\n${p2[1]}\n31\n0.0\n`;
        }
        return lines;
      }

      window.onload = runPacking;
    </script>
  </body>
</html>
