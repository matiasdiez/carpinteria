    <style>
      /* Base FlyonUI Variables */

      body {

        background: var(--bg-body);
        color: var(--text-main);
        margin: 0;
      }

      /* Navbar */

        display: flex;

      .navbar-brand {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .navbar-menu {
        display: flex;
        gap: 0.5rem;
      }
      .nav-item {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-btn);
        transition: all 0.2s;
      }
      .nav-item:hover {
        background: #f1f5f9;
        color: var(--text-main);
      }
      .nav-item.active {
        background: #eff6ff;
        color: var(--primary);
        font-weight: 600;
      }

      /* Layout & Cards */
      .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-box);
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--shadow-sm);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
      }

      /* Buttons */
      .btn {
        padding: 0.5rem 1rem;
        border-radius: var(--radius-btn);
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);

      .btn-outline:hover {

      }
      .button-group {

        gap: 0.75rem;
      }

      /* SVG Styling */
      .material-section {
        margin-bottom: 4rem;
      }
      .material-title {

        margin-bottom: 1.5rem;
        color: var(--text-main);
      }
      .board-container {

      }
      .board-label {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--text-muted);
      }

      svg {
        border: 2px solid var(--border);
        border-radius: 0.5rem;
        background: #f8fafc;
        width: 100%;
        height: auto;
        box-shadow: var(--shadow-sm);
      }
      .part {
        transition: fill 0.2s;
      }
      .part:hover {
        fill: #bfdbfe !important;
      }
      .part-text {
        font-size: 24px;
        font-family: monospace;
        text-anchor: middle;
        font-weight: bold;
      }
      .part-sub {
        font-size: 16px;
        font-family: sans-serif;
        text-anchor: middle;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="navbar-brand">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="
            border: none;
            background: transparent;
            margin: 0;
            box-shadow: none;
          "
        >
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
        EstudioArte
      </a>
      <div class="navbar-menu">
        <a href="index.html" class="nav-item">1. Planos</a>
        <a href="presupuesto-mesa.html" class="nav-item"
          >2. Presupuesto / Cortes</a
        >
        <a href="planos-cnc.html" class="nav-item active"
          >3. Planos de Corte CNC</a
        >
        <a href="detalles-constructivos.html" class="nav-item">4. Detalles</a>
        <a href="plan-armado.html" class="nav-item">5. Armado</a>
      </div>
    </nav>

    <div class="container">
      <div class="card">
        <div class="card-header">
          <div>
            <h2 style="margin: 0; font-size: 1.5rem">
              Planos de Corte CNC MaxRects (Multi-material)
            </h2>
            <p
              style="
                margin: 0;
                margin-top: 0.5rem;
                color: var(--text-muted);
                font-size: 1rem;
              "
            >
              Algoritmo multi-heurística. Zócalos perimetrales integrados. Kerf
              de sierra: 3mm.
            </p>
          </div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="runPacking()">
              🔄 Calcular Cortes
            </button>
            <button class="btn btn-outline" onclick="downloadDXF()">
              📥 Descargar DXF
            </button>
            <button class="btn btn-outline" onclick="downloadSVG()">
              📥 Descargar SVG
            </button>
          </div>
        </div>

        <div id="output"></div>
      </div>
    </div>

    <script>
      // --- PARÁMETROS GENERALES ---
      const BOARD_W = 2750;
      const BOARD_H = 1830;
      const KERF = 3;

      // --- BASE DE DATOS DE PIEZAS ---
      const materialsData = {
        "MDF 25mm (Tablero)": [
          { id: "TAB-PRINCIPAL", w: 2596, h: 930, qty: 1 },
          { id: "TAB-REFUERZO", w: 2596, h: 295, qty: 3 },
        ],
        "MDF 18mm (Estructura y Frentes)": [
          { id: "A-TAPA/BASE", w: 1296, h: 930, qty: 2 },
          { id: "A-LATERAL", w: 912, h: 546, qty: 2 },
          { id: "A-TRASERA", w: 1260, h: 546, qty: 1 },
          { id: "A-FRENTE", w: 1296, h: 80, qty: 7 },
          { id: "A-ZOCALO-FR/TR", w: 1296, h: 120, qty: 2 },
          { id: "A-ZOCALO-LAT", w: 690, h: 50, qty: 2 },
          { id: "B-TAPA/BASE", w: 600, h: 930, qty: 2 },
          { id: "B-LATERAL", w: 912, h: 546, qty: 2 },
          { id: "B-DIVISOR", w: 564, h: 546, qty: 1 },
          { id: "B-EST-FRENTE", w: 564, h: 565, qty: 1 },
          { id: "B-ESTANTE", w: 564, h: 329, qty: 2 },
          { id: "B-FRENTE-GDE", w: 596, h: 140, qty: 2 },
          { id: "B-FRENTE-CH", w: 596, h: 60, qty: 3 },
          { id: "B-ZOCALO-FR/TR", w: 600, h: 120, qty: 2 },
          { id: "B-ZOCALO-LAT", w: 690, h: 50, qty: 2 },
          { id: "PLANTILLA-A", w: 860, h: 80, qty: 1 },
          { id: "PLANTILLA-B", w: 500, h: 140, qty: 1 },
        ],
        "MDF 12mm (Cajas Interiores)": [
          { id: "CAJ-A-LAT", w: 879, h: 50, qty: 14 },
          { id: "CAJ-A-FRENTE", w: 1210, h: 50, qty: 14 },
          { id: "CAJ-B-LAT-GDE", w: 550, h: 120, qty: 4 },
          { id: "CAJ-B-CON-GDE", w: 514, h: 120, qty: 4 },
          { id: "CAJ-B-LAT-CH", w: 550, h: 45, qty: 6 },
          { id: "CAJ-B-CON-CH", w: 514, h: 45, qty: 6 },
        ],
        "MDF 5.5mm (Fondos)": [
          { id: "FONDO-A0", w: 1210, h: 879, qty: 7 },
          { id: "FONDO-B", w: 528, h: 540, qty: 5 },
        ],
      };

      let packedResults = {};

      // --- ALGORITMO MAXRECTS ---
      class MaxRectsBin {
        constructor(w, h) {
          this.w = w;
          this.h = h;
          this.freeRects = [{ x: 0, y: 0, w: w, h: h }];
          this.usedRects = [];
        }

        insert(w, h, data) {
          let bestNode = null;
          let bestShortFit = Infinity;
          let bestLongFit = Infinity;

          for (let i = 0; i < this.freeRects.length; i++) {
            let fr = this.freeRects[i];

            // Orientación Original
            if (fr.w >= w && fr.h >= h) {
              let shortFit = Math.min(fr.w - w, fr.h - h);
              let longFit = Math.max(fr.w - w, fr.h - h);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = { x: fr.x, y: fr.y, w: w, h: h, data: data };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }

            // Orientación Rotada
            if (fr.w >= h && fr.h >= w) {
              let shortFit = Math.min(fr.w - h, fr.h - w);
              let longFit = Math.max(fr.w - h, fr.h - w);
              if (
                shortFit < bestShortFit ||
                (shortFit === bestShortFit && longFit < bestLongFit)
              ) {
                bestNode = { x: fr.x, y: fr.y, w: h, h: w, data: data };
                bestShortFit = shortFit;
                bestLongFit = longFit;
              }
            }
          }

          if (!bestNode) return null;
          this.usedRects.push(bestNode);

          let i = 0;
          while (i < this.freeRects.length) {
            if (this.splitNode(this.freeRects[i], bestNode)) {
              this.freeRects.splice(i, 1);
            } else {
              i++;
            }
          }
          this.pruneFreeList();
          return bestNode;
        }

        splitNode(freeNode, usedNode) {
          if (
            usedNode.x >= freeNode.x + freeNode.w ||
            usedNode.x + usedNode.w <= freeNode.x ||
            usedNode.y >= freeNode.y + freeNode.h ||
            usedNode.y + usedNode.h <= freeNode.y
          ) {
            return false;
          }

          if (usedNode.y > freeNode.y && usedNode.y < freeNode.y + freeNode.h) {
            this.freeRects.push({ ...freeNode, h: usedNode.y - freeNode.y });
          }
          if (usedNode.y + usedNode.h < freeNode.y + freeNode.h) {
            this.freeRects.push({
              ...freeNode,
              y: usedNode.y + usedNode.h,
              h: freeNode.y + freeNode.h - (usedNode.y + usedNode.h),
            });
          }
          if (usedNode.x > freeNode.x && usedNode.x < freeNode.x + freeNode.w) {
            this.freeRects.push({ ...freeNode, w: usedNode.x - freeNode.x });
          }
          if (usedNode.x + usedNode.w < freeNode.x + freeNode.w) {
            this.freeRects.push({
              ...freeNode,
              x: usedNode.x + usedNode.w,
              w: freeNode.x + freeNode.w - (usedNode.x + usedNode.w),
            });
          }
          return true;
        }

        pruneFreeList() {
          for (let i = 0; i < this.freeRects.length; i++) {
            for (let j = i + 1; j < this.freeRects.length; j++) {
              let rI = this.freeRects[i];
              let rJ = this.freeRects[j];
              if (
                rI.x >= rJ.x &&
                rI.y >= rJ.y &&
                rI.x + rI.w <= rJ.x + rJ.w &&
                rI.y + rI.h <= rJ.y + rJ.h
              ) {
                this.freeRects.splice(i, 1);
                i--;
                break;
              }
              if (
                rJ.x >= rI.x &&
                rJ.y >= rI.y &&
                rJ.x + rJ.w <= rI.x + rI.w &&
                rJ.y + rJ.h <= rI.y + rI.h
              ) {
                this.freeRects.splice(j, 1);
                j--;
              }
            }
          }
        }
      }

      // --- EJECUCIÓN PRINCIPAL CON MULTI-HEURÍSTICA ---
      function runPacking() {
        packedResults = {};
        const outputDiv = document.getElementById("output");
        outputDiv.innerHTML = "";

        for (const [materialName, parts] of Object.entries(materialsData)) {
          let basePartsToPack = [];

          parts.forEach((p) => {
            for (let i = 0; i < p.qty; i++) {
              basePartsToPack.push({ id: p.id, w: p.w + KERF, h: p.h + KERF });
            }
          });

          // Probamos 4 métodos de ordenamiento y nos quedamos con el que gaste menos placas.
          let bestBinsResult = null;
          let bestBinCount = Infinity;

          const heuristics = [
            (a, b) => b.w * b.h - a.w * a.h, // Por Área
            (a, b) => Math.max(b.w, b.h) - Math.max(a.w, a.h), // Por Lado Más Largo
            (a, b) => b.w + b.h - (a.w + a.h), // Por Perímetro
            (a, b) => {
              // Híbrido: Lado mayor primero, si empatan, por área.
              let maxA = Math.max(a.w, a.h),
                maxB = Math.max(b.w, b.h);
              if (maxB !== maxA) return maxB - maxA;
              return b.w * b.h - a.w * a.h;
            },
          ];

          for (let hIndex = 0; hIndex < heuristics.length; hIndex++) {
            let currentPartsToPack = JSON.parse(
              JSON.stringify(basePartsToPack),
            );
            currentPartsToPack.sort(heuristics[hIndex]);

            let currentBins = [];
            currentPartsToPack.forEach((part) => {
              let placed = false;
              for (let i = 0; i < currentBins.length; i++) {
                if (currentBins[i].insert(part.w, part.h, part.id)) {
                  placed = true;
                  break;
                }
              }
              if (!placed) {
                let newBin = new MaxRectsBin(BOARD_W, BOARD_H);
                newBin.insert(part.w, part.h, part.id);
                currentBins.push(newBin);
              }
            });

            if (currentBins.length < bestBinCount) {
              bestBinCount = currentBins.length;
              bestBinsResult = currentBins;
            }
          }

          packedResults[materialName] = bestBinsResult;

          // Paleta de colores
          const MAT_COLORS = {
            25: {
              fill: "#fef3c7",
              stroke: "#d97706",
              text: "#92400e",
              bg: "#fffbeb",
            },
            18: {
              fill: "#dbeafe",
              stroke: "#3b82f6",
              text: "#1e3a8a",
              bg: "#eff6ff",
            },
            12: {
              fill: "#dcfce7",
              stroke: "#22c55e",
              text: "#14532d",
              bg: "#f0fdf4",
            },
            5: {
              fill: "#ede9fe",
              stroke: "#8b5cf6",
              text: "#4c1d95",
              bg: "#f5f3ff",
            },
          };

          function getMatKey(name) {
            if (name.includes("25")) return "25";
            if (name.includes("18")) return "18";
            if (name.includes("12")) return "12";
            return "5";
          }
          const pal = MAT_COLORS[getMatKey(materialName)];

          let materialHtml = `<div class="material-section">
            <h3 class="material-title" style="border-left:4px solid ${pal.stroke}; padding-left:0.6rem;">
              ${materialName}
              <span style="font-size:0.8rem;font-weight:500;color:${pal.text};background:${pal.fill};border:1px solid ${pal.stroke};border-radius:999px;padding:0.1rem 0.6rem;margin-left:0.5rem;">${bestBinsResult.length} placa${bestBinsResult.length > 1 ? "s" : ""}</span>
            </h3>`;

          bestBinsResult.forEach((bin, index) => {
            let svgContent = `<svg viewBox="0 0 ${BOARD_W} ${BOARD_H}" xmlns="http://www.w3.org/2000/svg">`;
            svgContent += `<rect x="0" y="0" width="${BOARD_W}" height="${BOARD_H}" fill="${pal.bg}" stroke="${pal.stroke}" stroke-width="8" stroke-opacity="0.4"/>`;

            bin.usedRects.forEach((rect) => {
              let finalW = rect.w - KERF;
              let finalH = rect.h - KERF;
              svgContent += `
                <rect x="${rect.x}" y="${rect.y}" width="${finalW}" height="${finalH}" class="part" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="4" rx="6"/>
                <text x="${rect.x + finalW / 2}" y="${rect.y + finalH / 2}" class="part-text" fill="${pal.text}">${rect.data}</text>
                <text x="${rect.x + finalW / 2}" y="${rect.y + finalH / 2 + 25}" class="part-sub" fill="${pal.text}" opacity="0.75">${finalW} x ${finalH}</text>
              `;
            });

            svgContent += `</svg>`;
            materialHtml += `<div class="board-container">
              <div class="board-label">Placa ${index + 1}</div>
              ${svgContent}
            </div>`;
          });

          materialHtml += `</div>`;
          outputDiv.innerHTML += materialHtml;
        }
      }

      // --- FUNCIONES DE DESCARGA ---
      function downloadDXF() {
        let dxf = "0\nSECTION\n2\nENTITIES\n";
        const X_OFFSET_PER_BOARD = BOARD_W + 500;
        const Y_OFFSET_PER_MATERIAL = BOARD_H + 1000;
        let matIndex = 0;

        for (const [materialName, bins] of Object.entries(packedResults)) {
          let baseMatY = matIndex * Y_OFFSET_PER_MATERIAL;
          let safeLayerName = materialName.replace(/[^a-zA-Z0-9]/g, "_");

          bins.forEach((bin, binIndex) => {
            let boardOffsetX = binIndex * X_OFFSET_PER_BOARD;

            dxf += createDXFRectangle(
              boardOffsetX,
              baseMatY,
              BOARD_W,
              BOARD_H,
              `PLACA_${safeLayerName}`,
            );

            bin.usedRects.forEach((rect) => {
              dxf += createDXFRectangle(
                boardOffsetX + rect.x,
                baseMatY + rect.y,
                rect.w - KERF,
                rect.h - KERF,
                "CORTES",
              );
            });
          });
          matIndex++;
        }
        dxf += "0\nENDSEC\n0\nEOF\n";
        triggerDownload(
          "data:text/plain;charset=utf-8," + encodeURIComponent(dxf),
          "planos-cnc-completos.dxf",
        );
      }

      function createDXFRectangle(x, y, w, h, layer) {
        let lines = "";
        const points = [
          [x, y],
          [x + w, y],
          [x + w, y + h],
          [x, y + h],
        ];
        for (let i = 0; i < 4; i++) {
          let p1 = points[i];
          let p2 = points[(i + 1) % 4];
          lines += `0\nLINE\n8\n${layer}\n10\n${p1[0]}\n20\n${p1[1]}\n30\n0.0\n11\n${p2[0]}\n21\n${p2[1]}\n31\n0.0\n`;
        }
        return lines;
      }

      function downloadSVG() {
        const SPACING = 300;
        let totalWidth = 0;
        let totalHeight = 0;

        let matIndex = 0;
        for (const [materialName, bins] of Object.entries(packedResults)) {
          let rowWidth = bins.length * (BOARD_W + SPACING);
          if (rowWidth > totalWidth) totalWidth = rowWidth;
          matIndex++;
        }
        totalHeight = matIndex * (BOARD_H + SPACING);

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalWidth} ${totalHeight}">`;
        let currentY = 0;

        for (const [materialName, bins] of Object.entries(packedResults)) {
          svg += `<text x="0" y="${currentY + 100}" font-family="sans-serif" font-size="100" font-weight="bold" fill="#0f172a">${materialName}</text>`;

          bins.forEach((bin, binIndex) => {
            let currentX = binIndex * (BOARD_W + SPACING);
            let boardY = currentY + 200;

            svg += `<rect x="${currentX}" y="${boardY}" width="${BOARD_W}" height="${BOARD_H}" fill="#f8fafc" stroke="#94a3b8" stroke-width="10"/>`;

            bin.usedRects.forEach((rect) => {
              let finalW = rect.w - KERF;
              let finalH = rect.h - KERF;
              svg += `<rect x="${currentX + rect.x}" y="${boardY + rect.y}" width="${finalW}" height="${finalH}" fill="#dbeafe" stroke="#3b82f6" stroke-width="4"/>`;
              svg += `<text x="${currentX + rect.x + finalW / 2}" y="${boardY + rect.y + finalH / 2}" font-family="monospace" font-size="32" font-weight="bold" fill="#1e3a8a" text-anchor="middle">${rect.data}</text>`;
              svg += `<text x="${currentX + rect.x + finalW / 2}" y="${boardY + rect.y + finalH / 2 + 40}" font-family="sans-serif" font-size="24" fill="#1e3a8a" text-anchor="middle">${finalW}x${finalH}</text>`;
            });
          });
          currentY += BOARD_H + SPACING + 300;
        }
        svg += `</svg>`;
        triggerDownload(
          "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg),
          "planos-cnc-completos.svg",
        );
      }

      function triggerDownload(dataUri, filename) {
        let a = document.createElement("a");
        a.href = dataUri;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      window.onload = runPacking;
    </script>
  </body>
