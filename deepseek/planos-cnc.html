<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nesting CNC · Multi-material · Artista</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;
        --white: #ffffff;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --border-radius: 0.75rem;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--slate-100);
        color: var(--slate-800);
      }
      .navbar {
        position: sticky;
        top: 0;
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(203, 213, 225, 0.4);
        padding: 0.75rem 2rem;
        display: flex;
        gap: 2rem;
        align-items: center;
      }
      .navbar a {
        text-decoration: none;
        color: var(--slate-700);
        font-weight: 500;
        padding: 0.5rem 0;
      }
      .container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }
      .card {
        background: var(--white);
        border-radius: var(--border-radius);
        border: 1px solid var(--slate-200);
        box-shadow: var(--shadow-sm);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }
      .card-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        border-left: 4px solid var(--slate-400);
        padding-left: 1rem;
      }
      .btn {
        background: var(--white);
        border: 1px solid var(--slate-300);
        color: var(--slate-700);
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        font-weight: 500;
        cursor: pointer;
      }
      .btn:hover {
        background: var(--slate-100);
      }
      select,
      input {
        padding: 0.5rem;
        border-radius: 30px;
        border: 1px solid var(--slate-300);
        background: var(--white);
      }
      canvas {
        border: 1px solid var(--slate-200);
        border-radius: 0.5rem;
        max-width: 100%;
        height: auto;
        background: var(--slate-50);
      }
      .flex-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <span style="font-weight: 600">🔍 Detalles constructivos</span>
      <a href="index.html">Planos</a
      ><a href="presupuesto-mesa.html">Presupuesto</a
      ><a href="planos-cnc.html">CNC</a
      ><a href="detalles-constructivos.html">Detalles</a
      ><a href="plan-armado.html">Armado</a>
    </nav>
    <main class="container">
      <div class="card">
        <div class="card-title">
          Generador de anidado (MaxRects BSSF) · Kerf 3mm
        </div>
        <div class="flex-row">
          <label>Material:</label>
          <select id="material-select">
            <option value="25">MDF 25mm (naranja)</option>
            <option value="18">MDF 18mm (verde)</option>
            <option value="12">MDF 12mm (azul)</option>
            <option value="5.5">MDF 5.5mm (ámbar)</option>
          </select>
          <button class="btn" id="nest-btn">🔄 Calcular anidado</button>
          <button class="btn" id="dxf-btn">📥 Descargar DXF (multicapa)</button>
        </div>
        <canvas
          id="nest-canvas"
          width="1000"
          height="600"
          style="width: 100%; height: auto; margin-top: 1rem"
        ></canvas>
        <p style="margin-top: 0.5rem; color: var(--slate-500)">
          Piezas sobre plancha 2750x1830mm. Los colores siguen código de cut
          list.
        </p>
      </div>
    </main>
    <script>
      (function () {
        const canvas = document.getElementById("nest-canvas");
        const ctx = canvas.getContext("2d");
        const materialSelect = document.getElementById("material-select");

        // Definición de piezas por espesor (coordenadas en mm)
        const partsDB = {
          25: [
            // naranja #f97316
            { id: "TOP", w: 2200, h: 1189, qty: 1 },
            { id: "SUB", w: 2200, h: 150, qty: 4 }, // tiras subcapa simplificadas
          ],
          18: [
            // verde #10b981
            { id: "FA1", w: 880, h: 80, qty: 7 },
            { id: "FB1", w: 580, h: 140, qty: 2 },
            { id: "FB2", w: 580, h: 60, qty: 3 },
            { id: "EST", w: 580, h: 1189, qty: 1 },
            { id: "ZOC", w: 400, h: 150, qty: 8 }, // suplementos
          ],
          12: [
            // azul #3b82f6
            { id: "MAR-A", w: 800, h: 120, qty: 14 },
            { id: "LAT-B", w: 550, h: 140, qty: 4 },
            { id: "LAT-B2", w: 550, h: 60, qty: 6 },
          ],
          5.5: [
            // ámbar #f59e0b
            { id: "FON-A", w: 870, h: 1170, qty: 7 },
            { id: "FON-B", w: 570, h: 580, qty: 5 },
          ],
        };

        const colors = {
          25: "#f97316",
          18: "#10b981",
          12: "#3b82f6",
          5.5: "#f59e0b",
        };

        // MaxRects BSSF simplificado (solo para visualización)
        function maxRects(parts, sheetW, sheetH, kerf = 3) {
          let freeRects = [{ x: 0, y: 0, w: sheetW, h: sheetH }];
          let placed = [];

          // ordenar por área descendente (heuristic)
          const sorted = [...parts].sort((a, b) => b.w * b.h - a.w * a.h);

          for (let p of sorted) {
            for (let i = 0; i < p.qty; i++) {
              let bestIdx = -1;
              let bestScore = Infinity;
              let bestRect = null;
              for (let j = 0; j < freeRects.length; j++) {
                const r = freeRects[j];
                if (r.w >= p.w + kerf && r.h >= p.h + kerf) {
                  // BSSF: minimizar área residual (corto plazo)
                  let score = (r.w - p.w) * (r.h - p.h);
                  if (score < bestScore) {
                    bestScore = score;
                    bestIdx = j;
                    bestRect = { ...r, idx: j };
                  }
                }
              }
              if (bestIdx !== -1) {
                const r = bestRect;
                placed.push({ x: r.x, y: r.y, w: p.w, h: p.h, id: p.id });
                // dividir freeRect
                const remainR = {
                  x: r.x + p.w + kerf,
                  y: r.y,
                  w: r.w - p.w - kerf,
                  h: p.h,
                };
                const remainB = {
                  x: r.x,
                  y: r.y + p.h + kerf,
                  w: r.w,
                  h: r.h - p.h - kerf,
                };
                freeRects.splice(bestIdx, 1);
                if (remainR.w > 0 && remainR.h > 0) freeRects.push(remainR);
                if (remainB.w > 0 && remainB.h > 0) freeRects.push(remainB);
                // simplificación: no se hace merging
              } else {
                console.warn("No space for", p.id);
              }
            }
          }
          return placed;
        }

        function drawNesting(materialKey) {
          const parts = partsDB[materialKey] || [];
          const flatParts = [];
          parts.forEach((p) => {
            for (let i = 0; i < p.qty; i++)
              flatParts.push({ w: p.w, h: p.h, id: p.id });
          });
          const sheetW = 2750,
            sheetH = 1830;
          const kerf = 3;
          const placed = maxRects(flatParts, sheetW, sheetH, kerf);

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.strokeStyle = "#94a3b8";
          ctx.lineWidth = 2;
          ctx.strokeRect(50, 50, sheetW / 5, sheetH / 5); // escalado 1:5 aprox
          ctx.fillStyle = colors[materialKey] + "40";
          ctx.fillRect(50, 50, sheetW / 5, sheetH / 5);

          placed.forEach((p) => {
            const x = 50 + p.x / 5;
            const y = 50 + p.y / 5;
            const w = p.w / 5,
              h = p.h / 5;
            ctx.fillStyle = colors[materialKey] + "80";
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, w, h);
            ctx.font = "8px monospace";
            ctx.fillStyle = "#0f172a";
            ctx.fillText(p.id, x + 2, y + 10);
          });
        }

        document.getElementById("nest-btn").addEventListener("click", () => {
          drawNesting(materialSelect.value);
        });

        document.getElementById("dxf-btn").addEventListener("click", () => {
          const materialKey = materialSelect.value;
          const parts = partsDB[materialKey] || [];
          const flatParts = [];
          parts.forEach((p) => {
            for (let i = 0; i < p.qty; i++)
              flatParts.push({ w: p.w, h: p.h, id: p.id });
          });
          const placed = maxRects(flatParts, 2750, 1830, 3);
          // Generar DXF simple (solo contornos)
          let dxf = `0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n`;
          placed.forEach((p, idx) => {
            dxf += `0\nLWPOLYLINE\n8\n${materialKey}mm\n90\n4\n70\n1\n`;
            dxf += `10\n${p.x}\n20\n${p.y}\n`;
            dxf += `10\n${p.x + p.w}\n20\n${p.y}\n`;
            dxf += `10\n${p.x + p.w}\n20\n${p.y + p.h}\n`;
            dxf += `10\n${p.x}\n20\n${p.y + p.h}\n`;
          });
          dxf += `0\nENDSEC\n0\nEOF`;
          const blob = new Blob([dxf], { type: "application/dxf" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `nesting_${materialKey}mm.dxf`;
          a.click();
        });

        // dibujo inicial
        drawNesting("25");
      })();
    </script>
  </body>
</html>
